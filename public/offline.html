<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CalTrack — Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07070D;
      color: #f4f4f5;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px;
      background: rgba(124,110,248,0.12);
      border: 1px solid rgba(124,110,248,0.28);
      border-radius: 24px;
      display: flex; align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 28px; font-weight: 800;
      letter-spacing: -0.03em; line-height: 1.1;
      margin-bottom: 12px;
    }
    h1 span { color: #9d5cf6; }
    p {
      color: rgba(244,244,245,0.55);
      font-size: 14px; line-height: 1.6;
      max-width: 280px; margin: 0 auto 32px;
    }
    button {
      background: #7C6EF8;
      color: white;
      border: none;
      border-radius: 100px;
      padding: 14px 32px;
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(124,110,248,0.35);
    }
    .mono {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(244,244,245,0.3);
      margin-top: 48px;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're <span>offline</span></h1>
  <p>CalTrack needs a connection to sync your food log and AI features. Check your internet and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
  <p class="mono">CalTrack v1.0</p>
</body>
</html>
